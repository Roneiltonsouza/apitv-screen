<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apitv screen PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --header-bg: #000; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-top: 130px; display: flex; flex-direction: column; align-items: center; }
        
        /* CABEÇALHO NO TOPO (PARTE DE CIMA) */
        .main-header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: var(--header-bg); 
            z-index: 1001; 
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .header-title { color: var(--primary); margin: 0; font-size: 20px; letter-spacing: 1px; font-weight: bold; }

        /* ABA USUÁRIO PRIVADO DENTRO DO CABEÇALHO */
        .btn-privado-header {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-privado-header:hover { background: var(--primary); color: black; }

        /* ABAS DE GÊNERO ABAIXO DO CABEÇALHO */
        .genre-bar {
            position: fixed;
            top: 55px; /* Logo abaixo do cabeçalho principal */
            left: 0;
            width: 100%;
            background: #0a0a0a;
            z-index: 1000;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        .tabs-container { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            scrollbar-width: none; 
            padding: 0 15px;
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-btn { 
            background: #222; 
            color: #888; 
            border: 1px solid #333; 
            padding: 10px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            white-space: nowrap; 
            font-size: 13px;
        }
        .tab-btn.active { background: var(--primary); color: black; border-color: var(--primary); }

        .container { width: 95%; max-width: 800px; padding: 10px; }
        
        .player-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; margin-bottom: 20px; }
        
        #videoPlayer { width: 100%; border-radius: 8px; background: #000; margin-top: 10px; border: 2px solid #333; display: none; aspect-ratio: 16/9; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; width: 100%; }
        .channel-item { background: var(--card); padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; border: 1px solid #222; transition: 0.3s; }
        .channel-item img { width: 65px; height: 65px; object-fit: contain; margin-bottom: 8px; border-radius: 8px; }
        .channel-item p { font-size: 11px; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        #status-msg { font-size: 10px; color: var(--primary); font-weight: bold; text-transform: uppercase; margin-top: 5px; }

        /* Painel Admin Privado */
        #private-panel { display: none; background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; margin-top: 20px; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; font-size: 16px; outline: none; }
        .btn-play { background: var(--primary); color: black; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 95%; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="header-title">APITV SCREEN</h1>
        <button class="btn-privado-header" onclick="acessoSeguro()">USUÁRIO PRIVADO</button>
    </header>

    <nav class="genre-bar">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('aberta', this)">TV ABERTA</button>
            <button class="tab-btn" onclick="switchTab('variedades', this)">VARIEDADES</button>
            <button class="tab-btn" onclick="switchTab('kids', this)">KIDS</button>
        </div>
    </nav>

    <div class="container">
        <div class="player-card">
            <div id="status-msg">Sincronizando...</div>
            <video id="videoPlayer" controls playsinline></video>
        </div>

        <div id="channelDisplay" class="channel-grid"></div>

        <div id="private-panel">
            <p style="color: var(--primary); font-size: 12px; margin-bottom: 20px;">SISTEMA DE SINCRONIZAÇÃO CLOUD</p>
            <input type="text" id="listName" placeholder="Nome da Lista">
            <input type="text" id="listUrl" placeholder="URL M3U8">
            <button class="btn-play" onclick="saveAndSync()">SINCRONIZAR LISTA</button>

            <div id="active-list-info" style="display:none; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
                <span id="currentListName" style="font-weight: bold; color: var(--primary);"></span><br><br>
                <button style="color:#ff4444; background:none; border:none; cursor:pointer;" onclick="deleteList()">[ APAGAR TUDO ]</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIza58AfRp1KcBIxoobHdZ2gFzL4WesjLpWWTmB";
        const DB_URL = "https://netbase-cloud-default-rtdb.firebaseio.com/listas";
        const SENHA_MESTRA = "netchaveapi";
        
        let hls = new Hls();
        const video = document.getElementById('videoPlayer');
        let allChannels = [];
        let currentCategory = 'aberta';
        let currentListId = null;

        function acessoSeguro() {
            const pass = prompt("ID Único de Acesso:");
            if (pass === SENHA_MESTRA) {
                switchTab('privado', document.querySelector('.btn-privado-header'));
            } else {
                alert("ID Inválido.");
            }
        }

        function switchTab(category, btn) {
            currentCategory = category;
            
            // Limpa as abas de gênero apenas se não for a privada
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(category !== 'privado') btn.classList.add('active');

            const grid = document.getElementById('channelDisplay');
            const panel = document.getElementById('private-panel');

            if (category === 'privado') {
                grid.style.display = 'none';
                panel.style.display = 'block';
            } else {
                grid.style.display = 'grid';
                panel.style.display = 'none';
                renderChannels();
            }
        }

        function playChannel(url, name) {
            video.style.display = "block";
            document.getElementById('status-msg').innerText = "LIVE: " + name;
            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url; video.play();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveAndSync() {
            const n = document.getElementById('listName').value;
            const u = document.getElementById('listUrl').value;
            if (!n || !u) return alert("Erro nos dados!");
            await fetch(`${DB_URL}.json?auth=${API_KEY}`, { method: 'POST', body: JSON.stringify({ nome: n, url: u }) });
            location.reload();
        }

        async function loadCloud() {
            try {
                const res = await fetch(`${DB_URL}.json?auth=${API_KEY}`);
                const data = await res.json();
                if (data) {
                    const keys = Object.keys(data);
                    currentListId = keys[keys.length - 1];
                    const list = data[currentListId];
                    document.getElementById('currentListName').innerText = "Lista Ativa: " + list.nome;
                    document.getElementById('active-list-info').style.display = "block";
                    document.getElementById('status-msg').innerText = "Sincronizado";
                    parseM3U(list.url);
                }
            } catch (e) { document.getElementById('status-msg').innerText = "Erro Cloud"; }
        }

        async function parseM3U(url) {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const lines = text.split('\n');
                allChannels = [];
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('#EXTINF:')) {
                        const name = lines[i].split(',')[1] || "Canal";
                        const streamUrl = lines[i+1]?.trim();
                        const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                        if(streamUrl?.startsWith('http')) allChannels.push({ name, url: streamUrl, logo });
                    }
                }
                renderChannels();
            } catch (e) {}
        }

        function renderChannels() {
            const display = document.getElementById('channelDisplay');
            display.innerHTML = '';
            const filtered = allChannels.filter(c => {
                const n = c.name.toLowerCase();
                if (currentCategory === 'kids') return n.includes('kids') || n.includes('desenho') || n.includes('disney');
                if (currentCategory === 'variedades') return n.includes('filme') || n.includes('serie') || n.includes('hbo');
                return !n.includes('kids') && !n.includes('filme') && !n.includes('serie');
            });
            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.onclick = () => playChannel(c.url, c.name);
                div.innerHTML = `<img src="${c.logo || 'https://via.placeholder.com/65/111/00ff88?text=TV'}"><p>${c.name}</p>`;
                display.appendChild(div);
            });
        }

        async function deleteList() {
            if (currentListId && confirm("Deletar lista cloud?")) {
                await fetch(`${DB_URL}/${currentListId}.json?auth=${API_KEY}`, { method: 'DELETE' });
                location.reload();
            }
        }

        window.onload = loadCloud;
    </script>
</body>
</html>
