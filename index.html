<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apitv screen PRO - OFICIAL</title>
    
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clappr-pip@latest/dist/clappr-pip.min.js"></script>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>

    <style>
        :root { 
            --bg: #050505; 
            --card: #121212; 
            --led-blue: #00ccff;
            --primary: #00ff88;
            --premium: #ff9900;
            --grad-text: linear-gradient(90deg, #ff0000 0%, #ffffff 35%, #800080 65%, #ffa500 100%);
            --grad-border: linear-gradient(45deg, #ff0000, #ffffff, #800080, #ffa500);
        }
        
        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; 
            padding-top: 140px; display: flex; flex-direction: column; align-items: center; 
            overflow-x: hidden;
        }
        
        /* HEADER E CONTROLES ORIGINAIS */
        .main-header { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.98); z-index: 1001; 
            border-bottom: 1px solid #222; display: flex; 
            flex-direction: column; align-items: center; 
            padding: 15px 20px; box-sizing: border-box; backdrop-filter: blur(10px);
            background-size: cover; background-position: center;
        }

        .header-title { 
            margin: 0 0 10px 0; font-size: 26px; font-weight: 800; text-transform: uppercase;
            background: var(--grad-text); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; cursor: pointer; letter-spacing: 2px;
        }

        .header-row { display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; }
        .floating-controls { display: flex; flex-direction: column; gap: 5px; align-items: center; }

        .header-arrow-box {
            width: 55px; height: 35px; border: 2px solid var(--led-blue); 
            border-radius: 6px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #111; cursor: pointer;
        }
        .led-active { animation: blink-blue 0.5s infinite alternate; box-shadow: 0 0 15px var(--led-blue); }
        @keyframes blink-blue { from { opacity: 1; } to { opacity: 0.4; } }

        .genre-float-box {
            width: 65px; height: 28px; border: 2px solid;
            border-image: var(--grad-border) 1; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            background: #111; font-size: 9px; font-weight: bold; 
            text-transform: uppercase; color: white; cursor: pointer;
        }

        #genre-popup {
            display: none; position: fixed; top: 135px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.98); border: 1px solid #333; 
            padding: 10px; border-radius: 12px; z-index: 2000;
            width: 85%; max-width: 320px; box-shadow: 0 10px 40px #000;
        }
        .popup-item { padding: 14px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; font-weight: bold; color: #eee; text-align: center; }
        .popup-item:active { background: #333; }

        #player-wrapper, #twitch-container { 
            width: 100%; aspect-ratio: 16/9; border-radius: 12px; 
            margin-bottom: 20px; display: none; background: #000; 
            border: 1px solid #333; 
            position: relative; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .container { width: 95%; max-width: 900px; padding-bottom: 50px; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .channel-item { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #222; cursor: pointer; }
        .channel-item img { width: 60px; height: 60px; object-fit: contain; border-radius: 8px; margin-bottom: 5px; background: #000;}
        .channel-item p { font-size: 11px; margin: 0; color: #ccc; font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        
        /* TAG DO CANAL (YouTube Style) */
        .channel-author { font-size: 8px; color: var(--premium); font-weight: bold; display: block; margin-top: 2px; }

        #auth-panel, #private-panel { 
            display: none; background: #0f0f0f; padding: 25px; 
            border-radius: 20px; border: 1px solid var(--primary); margin-top: 10px; text-align: center;
        }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        
        .btn-header { background: #111; border-radius: 6px; font-size: 10px; font-weight: bold; padding: 10px 12px; cursor: pointer; }
        .btn-post-header { color: var(--premium); border: 1px solid var(--premium); }
        .btn-privado-header { color: var(--primary); border: 1px solid var(--primary); }
        .btn-fullscreen-header { color: #fff; border: 1px solid #444; font-size: 8px; padding: 4px 8px; margin-top: 4px; display: block; width: 100%; text-align: center;}

        #status-msg { font-size: 10px; color: var(--primary); font-weight: bold; text-align: center; margin-bottom: 10px; text-transform: uppercase; }
        .yt-manager-box { margin-top: 20px; text-align: left; background: #111; border-radius: 10px; padding: 10px; max-height: 200px; overflow-y: auto; border: 1px solid #222; }
    </style>
</head>
<body>

    <header class="main-header" id="headerPrincipal">
        <h1 class="header-title" onclick="location.reload()">APITV SCREEN</h1>
        <div class="header-row">
            <div class="floating-controls">
                <div class="header-arrow-box" id="ledArrow" onclick="comandoAtalho()">
                    <span style="color:var(--led-blue); font-size:18px">⬇</span>
                    <span style="color:var(--led-blue); font-size:7px; font-weight:bold">TV ABERTA</span>
                </div>
                <div class="genre-float-box" onclick="togglePopup()">GÊNERO</div>
            </div>
            <div class="header-actions" style="display:flex; gap:10px">
                <button class="btn-header btn-post-header" onclick="switchTab('auth')">POST FILMES</button>
                <div style="display: flex; flex-direction: column;">
                    <button class="btn-header btn-privado-header" onclick="acessoSeguro()">PRIVADO</button>
                    <button class="btn-fullscreen-header btn-header" onclick="toggleFullScreen()">📺 TELA CHEIA</button>
                </div>
            </div>
        </div>
    </header>

    <div id="genre-popup">
        <div class="popup-item" onclick="switchTab('Vidyou tv Aberta')">VIDYOU TV ABERTA</div>
        <div class="popup-item" onclick="switchTab('Vidyou Variedades')">VIDYOU VARIEDADES</div>
        <div class="popup-item" onclick="switchTab('Vidyou Kids')">VIDYOU KIDS</div>
        <div class="popup-item" onclick="switchTab('Sinal Direto')">SINAL DIRETO (PRISM)</div>
        <div class="popup-item" onclick="switchTab('Reve Filmes')">REVE FILMES</div>
        <div class="popup-item" onclick="switchTab('Live YouTube')">LIVE YOUTUBE</div>
        <div class="popup-item" onclick="switchTab('Filmes')">FILMES</div>
    </div>

    <div class="container">
        <div id="status-msg">Sincronizando Grade...</div>
        <div id="player-wrapper"></div>
        <div id="twitch-container"></div>
        <div id="channelDisplay" class="channel-grid"></div>

        <div id="auth-panel">
            <div id="auth-card">
                <h2 style="color: var(--premium);">Painel de Postagem</h2>
                <input type="text" id="regName" placeholder="Seu Nome">
                <input type="email" id="regEmail" placeholder="Seu E-mail">
                <button class="btn-action" style="background:var(--premium)" onclick="solicitarAcesso()">SOLICITAR ACESSO</button>
                <hr style="border: 1px solid #222; margin: 20px 0;">
                <input type="text" id="idLogin" placeholder="Digite seu ID">
                <button class="btn-action" style="background:var(--primary)" onclick="logarPostagem()">ENTRAR NO PAINEL</button>
            </div>
            
            <div id="post-area" style="display:none;">
                <h3 style="color: var(--premium);">Editar Canal / Perfil</h3>
                <input type="text" id="cName" placeholder="Nome do Canal (Ex: Canal VIP)">
                <input type="text" id="cPhoto" placeholder="Link da Foto do Canal">
                <button class="btn-action" style="background:#222; color:white; font-size:12px" onclick="salvarCanal()">ATUALIZAR PERFIL</button>
                
                <hr style="border: 1px solid #222; margin: 20px 0;">
                <h3 style="color: var(--primary);">Publicar em REVE FILMES</h3>
                <input type="text" id="pName" placeholder="Nome do Filme">
                <input type="text" id="pLogo" placeholder="Link da Capa">
                <input type="text" id="pUrl" placeholder="Link do Filme">
                <button class="btn-action" style="background:var(--primary)" onclick="postarFilmePublico()">POSTAR AGORA</button>
            </div>
        </div>

        <div id="private-panel">
            <h3 style="color: var(--primary);">Painel Cloud M3U8</h3>
            <input type="text" id="listUrl" placeholder="Link M3U8">
            <button class="btn-action" style="background:var(--primary)" onclick="saveAndSync()">ATUALIZAR LISTA</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIza58AfRp1KcBIxoobHdZ2gFzL4WesjLpWWTmB";
        const BASE_URL = "https://netbase-cloud-default-rtdb.firebaseio.com";
        const ID_ACESSO = "netchaveapi";
        let player, allChannels = [], ytChannels = [], currentCategory = 'Vidyou tv Aberta', userLogado = null;

        async function loadCloud() {
            try {
                const res = await fetch(`${BASE_URL}/listas.json?auth=${API_KEY}`);
                const data = await res.json();
                if (data) { const last = Object.keys(data).pop(); await parseM3U(data[last].url); }
                
                const resYt = await fetch(`${BASE_URL}/youtube.json?auth=${API_KEY}`);
                const dataYt = await resYt.json();
                ytChannels = [];
                if(dataYt) Object.keys(dataYt).forEach(id => { ytChannels.push({...dataYt[id], id}); });
                renderChannels();
            } catch(e) { console.log(e); }
        }

        async function parseM3U(url) {
            const resp = await fetch(url);
            const text = await resp.text();
            const lines = text.split('\n');
            allChannels = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('#EXTINF:')) {
                    const name = lines[i].split(',')[1]?.trim();
                    const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                    const group = lines[i].match(/group-title="([^"]+)"/)?.[1]?.trim() || "";
                    allChannels.push({ name, url: lines[i+1]?.trim(), logo, group });
                }
            }
        }

        function renderChannels() {
            const display = document.getElementById('channelDisplay');
            display.innerHTML = '';
            const search = currentCategory.toLowerCase().trim();
            let list = (['live youtube', 'filmes', 'reve filmes'].includes(search)) 
                ? ytChannels.filter(c => c.group.toLowerCase() === search) 
                : allChannels.filter(c => c.group.toLowerCase().includes(search));

            list.forEach(c => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.onclick = () => iniciarPlayer(c.url, c.name);
                let author = (c.group === 'Reve Filmes' && c.channelName) ? `<span class="channel-author">${c.channelName}</span>` : '';
                div.innerHTML = `<img src="${c.logo || 'https://via.placeholder.com/70'}"><p>${c.name}</p>${author}`;
                display.appendChild(div);
            });
        }

        function iniciarPlayer(url, name) {
            const container = document.getElementById('player-wrapper');
            container.style.display = 'block';
            if (player) player.destroy();
            container.innerHTML = "";
            player = new Clappr.Player({ source: url, parentId: "#player-wrapper", width: '100%', height: '100%', autoPlay: true });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function solicitarAcesso() {
            const nome = document.getElementById('regName').value;
            const pin = Math.floor(1000 + Math.random() * 9000);
            const idGerado = nome.substring(0,3).toUpperCase() + pin;
            await fetch(`${BASE_URL}/usuarios_premium/${pin}.json?auth=${API_KEY}`, { method: 'PUT', body: JSON.stringify({ nome, id: idGerado, channelName: nome }) });
            alert("Seu ID: " + idGerado);
        }

        async function logarPostagem() {
            const id = document.getElementById('idLogin').value;
            const res = await fetch(`${BASE_URL}/usuarios_premium.json?auth=${API_KEY}`);
            const users = await res.json();
            if(users) Object.keys(users).forEach(k => { 
                if(users[k].id === id) {
                    userLogado = { ...users[k], key: k };
                    document.getElementById('auth-card').style.display = 'none';
                    document.getElementById('post-area').style.display = 'block';
                    document.getElementById('cName').value = userLogado.channelName || userLogado.nome;
                }
            });
        }

        async function salvarCanal() {
            const name = document.getElementById('cName').value;
            const photo = document.getElementById('cPhoto').value;
            await fetch(`${BASE_URL}/usuarios_premium/${userLogado.key}.json?auth=${API_KEY}`, { method: 'PATCH', body: JSON.stringify({ channelName: name, channelPhoto: photo }) });
            userLogado.channelName = name;
            alert("Perfil Atualizado!");
        }

        async function postarFilmePublico() {
            const data = { 
                name: document.getElementById('pName').value, 
                url: document.getElementById('pUrl').value, 
                logo: document.getElementById('pLogo').value, 
                group: 'Reve Filmes',
                channelName: userLogado.channelName || userLogado.nome
            };
            await fetch(`${BASE_URL}/youtube.json?auth=${API_KEY}`, { method: 'POST', body: JSON.stringify(data) });
            alert("Postado!"); loadCloud();
        }

        function switchTab(cat) { currentCategory = cat; document.getElementById('auth-panel').style.display = (cat === 'auth') ? 'block' : 'none'; renderChannels(); }
        function acessoSeguro() { if(prompt("PIN:") === ID_ACESSO) document.getElementById('private-panel').style.display='block'; }
        function togglePopup() { const p = document.getElementById('genre-popup'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; }
        window.onload = loadCloud;
    </script>
</body>
</html>
